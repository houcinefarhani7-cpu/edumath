<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>مولّد التمارين — EDU MATH 🇹🇳</title>
<link rel="stylesheet" href="../css/style.css">
<style>
body{background:#f4f8fd}
.page{max-width:960px;margin:0 auto;padding:28px 20px}
.page-header{background:linear-gradient(135deg,var(--purple),#534AB7);border-radius:14px;padding:24px 28px;color:#fff;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
.ph-title{font-size:20px;font-weight:700;margin-bottom:6px}
.ph-sub{font-size:13px;opacity:.85;line-height:1.6}
.ph-cnt{background:rgba(255,255,255,.18);border-radius:10px;padding:10px 18px;text-align:center}
.pn{font-size:26px;font-weight:700}
.pl{font-size:11px;opacity:.8;margin-top:2px}
.gen-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px}
.gc-title{font-size:15px;font-weight:700;color:#0d1f35;margin-bottom:18px}
.cfg-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:600px){.cfg-grid{grid-template-columns:1fr}}
.cfg-item label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.diff-toggle{display:flex;gap:0;background:var(--bg2);border-radius:9px;padding:3px}
.db{flex:1;padding:7px;border:none;background:transparent;border-radius:7px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;font-family:inherit}
.db.active{color:#fff}
.db.easy.active{background:var(--teal)}
.db.med.active{background:var(--amber)}
.db.hard.active{background:var(--red)}
.count-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.count-row label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
input[type=range]{flex:1;accent-color:var(--purple)}
.cnt-val{font-size:18px;font-weight:700;color:var(--purple);min-width:24px;text-align:center}
.btn-gen{width:100%;padding:14px;background:linear-gradient(135deg,var(--purple),#534AB7);color:#fff;border:none;border-radius:11px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(127,119,221,.3);font-family:inherit}
.btn-gen:hover{opacity:.9;transform:translateY(-1px)}
.results{display:none}
.res-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.res-title{font-size:17px;font-weight:700;color:#0d1f35}
.res-btns{display:flex;gap:8px}
.btn-action{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border:1.5px solid var(--border);background:#fff;color:var(--text);font-family:inherit}
.btn-action:hover{border-color:var(--sky);color:var(--sky)}
.btn-action.pri{background:var(--sky);color:#fff;border-color:var(--sky)}
.ex-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;animation:fadeUp .3s ease}
.ex-head{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.ex-meta{display:flex;align-items:center;gap:8px}
.ex-num{font-size:11px;font-weight:700;color:var(--muted);background:#fff;padding:2px 9px;border-radius:5px;border:1px solid var(--border)}
.ex-body{padding:14px 18px}
.ex-q{font-size:14px;font-weight:600;color:#0d1f35;margin-bottom:12px;font-family:Georgia,serif}
.opt{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:7px;border:1.5px solid var(--border);cursor:pointer;font-size:13px;background:#fff;margin-bottom:5px;transition:all .18s;font-family:Georgia,serif}
.opt:hover{border-color:var(--purple);background:#eeedfe}
.opt.sel{border-color:var(--purple);background:#eeedfe}
.opt.ok{border-color:var(--teal);background:#e1f5ee;color:#0a5c3a}
.opt.wrong{border-color:var(--red);background:#ffeded}
.ol{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;transition:all .18s}
.opt.sel .ol{border-color:var(--purple);background:var(--purple);color:#fff}
.opt.ok .ol{border-color:var(--teal);background:var(--teal);color:#fff}
.opt.wrong .ol{border-color:var(--red);background:var(--red);color:#fff}
.ex-footer{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-top:1px solid var(--border);background:var(--bg2)}
.btn-chk{background:var(--purple);color:#fff;border:none;padding:7px 18px;border-radius:7px;font-size:12px;cursor:pointer;font-weight:600;font-family:inherit;transition:opacity .2s}
.btn-chk:disabled{opacity:.4}
.res{font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;display:none}
.r-ok{background:#e1f5ee;color:var(--teal)}
.r-fail{background:#ffeded;color:var(--red)}
.score-box{background:linear-gradient(135deg,#f0fdf8,#e1f5ee);border:1.5px solid var(--teal);border-radius:12px;padding:20px;text-align:center;margin-top:16px;display:none}
.score-emoji{font-size:44px;margin-bottom:8px}
.score-val{font-size:32px;font-weight:700;color:var(--teal)}
.score-msg{font-size:14px;color:#0d1f35;margin-top:8px;font-weight:600}
</style>
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="nav-brand"><svg width="28" height="28" viewBox="0 0 40 40"><polygon points="20,3 36,12 36,28 20,37 4,28 4,12" fill="rgba(26,143,224,0.12)" stroke="#1a8fe0" stroke-width="1.5"/><text x="20" y="26" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-weight="700" fill="#1a8fe0">∑</text></svg>EDU MATH</a>
  <ul class="nav-links">
    <li><a href="../index.html">الرئيسية</a></li>
    <li><a href="lessons.html">الدروس</a></li>
    <li><a href="exercises.html">التمارين</a></li>
    <li><a href="exams.html">الامتحانات</a></li>
    <li><a href="assistant.html">المساعد 🤖</a></li>
    <li><a href="payment.html">الاشتراك</a></li>
  </ul>
  <div style="display:flex;gap:10px"><button class="btn btn-outline" onclick="window.location.href='login.html'">دخول</button><button class="btn btn-primary" onclick="window.location.href='login.html'">ابدأ مجاناً</button></div>
</nav>
<div class="page">
  <div class="page-header">
    <div>
      <div class="ph-title">🎲 مولّد التمارين الذكي</div>
      <div class="ph-sub">اختر السنة والموضوع والمستوى — تمارين مخصصة فوراً!</div>
    </div>
    <div class="ph-cnt"><div class="pn" id="genCount">0</div><div class="pl">تمرين مولَّد</div></div>
  </div>
  <div class="gen-card">
    <div class="gc-title">⚙️ إعدادات التوليد</div>
    <div class="cfg-grid">
      <div class="cfg-item"><label>السنة الدراسية</label><select class="form-select" id="cfg-year"><option value="7">السنة السابعة</option><option value="8">السنة الثامنة</option><option value="9">السنة التاسعة</option></select></div>
      <div class="cfg-item"><label>الموضوع</label><select class="form-select" id="cfg-topic"><option value="integers">الأعداد الصحيحة</option><option value="fractions">الكسور</option><option value="geometry">الهندسة</option><option value="ratio">التناسبية</option><option value="mixed">مختلط 🎲</option></select></div>
      <div class="cfg-item"><label>مستوى الصعوبة</label><div class="diff-toggle"><button class="db easy active" onclick="setDiff('easy',this)">سهل</button><button class="db med" onclick="setDiff('med',this)">متوسط</button><button class="db hard" onclick="setDiff('hard',this)">صعب</button></div></div>
    </div>
    <div class="count-row">
      <label>عدد التمارين</label>
      <input type="range" min="3" max="8" value="5" id="cntSlider" oninput="document.getElementById('cntDisp').textContent=this.value">
      <div class="cnt-val" id="cntDisp">5</div>
    </div>
    <button class="btn-gen" onclick="generate()"><span id="genBtnTxt">🎲 توليد التمارين</span></button>
  </div>
  <div class="results" id="results">
    <div class="res-head">
      <div class="res-title" id="resTitle">تمارين مولَّدة</div>
      <div class="res-btns">
        <button class="btn-action" onclick="generate()">🔄 إعادة التوليد</button>
        <button class="btn-action" onclick="checkAll()">✅ تصحيح الكل</button>
        <button class="btn-action pri" onclick="showToast('✅ تم حفظ المجموعة!')">💾 حفظ</button>
      </div>
    </div>
    <div id="exList"></div>
    <div class="score-box" id="scoreBox">
      <div class="score-emoji" id="scoreEmoji">🎉</div>
      <div class="score-val" id="scoreVal">0/0</div>
      <div class="score-msg" id="scoreMsg"></div>
    </div>
  </div>
</div>
<script src="../js/app.js"></script>
<script>
const bank={
  integers:{easy:[{q:'ما نتيجة: (−5)+(+3) ؟',opts:['−2','−8','+8','+2'],ans:0},{q:'ما نتيجة: (+6)+(−4) ؟',opts:['+10','+2','−2','−10'],ans:1},{q:'ما نتيجة: (−3)+(−7) ؟',opts:['−10','+10','−4','+4'],ans:0}],med:[{q:'احسب: (−12)+(+7)−(−3)',opts:['−2','+2','−22','+22'],ans:0},{q:'ما قيمة x إذا كانت x+(−5)=3 ؟',opts:['8','−8','−2','2'],ans:0}],hard:[{q:'إذا كانت درجة الحرارة −4° صباحاً وارتفعت 9 درجات ثم انخفضت 6، فما درجة الحرارة مساءً؟',opts:['−1°','+1°','+19°','−19°'],ans:1}]},
  fractions:{easy:[{q:'احسب: ½+¼ = ؟',opts:['¾','⅔','½','⅖'],ans:0},{q:'بسّط: 6/8',opts:['3/4','4/6','2/3','6/8'],ans:0},{q:'ما الكسر المكافئ لـ ½ ؟',opts:['3/6','3/4','1/3','2/3'],ans:0}],med:[{q:'احسب: ¾+⅔ = ؟',opts:['17/12','5/7','5/12','7/12'],ans:0},{q:'احسب: ⅗×½ = ؟',opts:['3/10','3/7','6/5','8/5'],ans:0}],hard:[{q:'احسب: (¾+⅔)÷½ = ؟',opts:['17/6','17/24','34/12','5/6'],ans:0}]},
  geometry:{easy:[{q:'مثلث زواياه 60° و70°. ما الزاوية الثالثة؟',opts:['50°','60°','40°','70°'],ans:0},{q:'ما مجموع زوايا المثلث؟',opts:['180°','360°','90°','270°'],ans:0}],med:[{q:'مستطيل طوله 8 سم وعرضه 5 سم. ما محيطه؟',opts:['26 سم','40 سم','13 سم','20 سم'],ans:0},{q:'مربع طول ضلعه 6 سم. ما مساحته؟',opts:['36 سم²','24 سم²','12 سم²','48 سم²'],ans:0}],hard:[{q:'مثلث قائم أضلاعه 3 و4 سم. ما وتره؟',opts:['5 سم','7 سم','6 سم','12 سم'],ans:0}]},
  ratio:{easy:[{q:'إذا كان 2 كغ ثمنه 6 دنانير، فكم ثمن 5 كغ؟',opts:['15 دينار','10 دينار','12 دينار','20 دينار'],ans:0},{q:'ما نسبة 3 من 12؟',opts:['¼','⅓','½','⅕'],ans:0}],med:[{q:'إذا كان 5 أقلام تكلّف 7.5 دينار، فكم تكلّف 8 أقلام؟',opts:['12 دينار','10 دينار','15 دينار','9 دينار'],ans:0}],hard:[{q:'قسّم 60 بنسبة 2:3. ما القسم الأكبر؟',opts:['36','24','30','40'],ans:0}]},
};
bank.mixed={easy:[...bank.integers.easy,...bank.fractions.easy,...bank.geometry.easy,...bank.ratio.easy],med:[...bank.integers.med,...bank.fractions.med,...bank.geometry.med,...bank.ratio.med],hard:[...bank.integers.hard,...bank.fractions.hard,...bank.geometry.hard,...bank.ratio.hard]};
let diff='easy',total=0,exs=[];
function setDiff(d,btn){diff=d;document.querySelectorAll('.db').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function shuffle(a){return a.sort(()=>Math.random()-.5);}
function generate(){
  const topic=document.getElementById('cfg-topic').value;
  const count=parseInt(document.getElementById('cntSlider').value);
  const year=document.getElementById('cfg-year').value;
  document.getElementById('genBtnTxt').textContent='⏳ جاري التوليد...';
  setTimeout(()=>{
    document.getElementById('genBtnTxt').textContent='🎲 توليد التمارين';
    const pool=shuffle([...(bank[topic]?.[diff]||bank.integers.easy)]);
    exs=pool.slice(0,Math.min(count,pool.length));
    if(exs.length<count){exs.push(...shuffle([...bank.integers.easy,...bank.fractions.easy]).slice(0,count-exs.length));}
    total+=exs.length;document.getElementById('genCount').textContent=total;
    renderExs(exs,year);
    document.getElementById('results').style.display='block';
    document.getElementById('scoreBox').style.display='none';
    document.getElementById('resTitle').textContent=`${exs.length} تمارين — السنة ${year} · ${diff==='easy'?'سهل':diff==='med'?'متوسط':'صعب'}`;
    document.getElementById('results').scrollIntoView({behavior:'smooth'});
  },700);
}
function renderExs(exs,year){
  document.getElementById('exList').innerHTML=exs.map((ex,i)=>`
    <div class="ex-card">
      <div class="ex-head">
        <div class="ex-meta"><span class="ex-num">تمرين ${String(i+1).padStart(2,'0')}</span><span style="font-size:11px;color:var(--purple);font-weight:600">س${year}</span></div>
        <span style="font-size:10px;font-weight:700;padding:2px 9px;border-radius:5px;background:#eeedfe;color:var(--purple)">${diff==='easy'?'سهل':diff==='med'?'متوسط':'صعب'}</span>
      </div>
      <div class="ex-body">
        <div class="ex-q">${ex.q}</div>
        <div id="opts${i}">
          ${ex.opts.map((o,j)=>`<div class="opt" onclick="pickO(this,'opts${i}',${j})"><div class="ol">${['أ','ب','ج','د'][j]}</div>${o}</div>`).join('')}
        </div>
      </div>
      <div class="ex-footer">
        <div style="display:flex;align-items:center;gap:10px"><button class="btn-chk" onclick="chkO('opts${i}',${ex.ans},this,'res${i}')">تحقق</button><span class="res" id="res${i}"></span></div>
        <span style="font-size:12px;color:var(--sky);cursor:pointer" onclick="window.location.href='assistant.html'">💡 تلميح</span>
      </div>
    </div>`).join('');
}
function pickO(el,gid,idx){document.querySelectorAll('#'+gid+' .opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');document.getElementById(gid)._s=idx;}
function chkO(gid,correct,btn,resId){
  const g=document.getElementById(gid);const sel=g._s;
  if(sel===undefined){alert('اختر إجابة');return;}
  g.querySelectorAll('.opt').forEach(o=>o.style.pointerEvents='none');
  g.querySelectorAll('.opt').forEach((o,i)=>{if(i===correct)o.classList.add('ok');else if(i===sel&&sel!==correct)o.classList.add('wrong');});
  const res=document.getElementById(resId);
  res.textContent=sel===correct?'✅ صحيح!':'❌ خطأ';
  res.className='res '+(sel===correct?'r-ok':'r-fail');
  res.style.display='inline-block';btn.disabled=true;
}
function checkAll(){document.querySelectorAll('.btn-chk:not(:disabled)').forEach(b=>b.click());setTimeout(showScore,300);}
function showScore(){
  const ok=document.querySelectorAll('.r-ok').length;const tot=exs.length;const pct=Math.round(ok/tot*100);
  const emoji=pct>=80?'🎉':pct>=60?'👍':'💪';
  const msg=pct>=80?'ممتاز! أنت متمكّن':pct>=60?'جيد! واصل التدريب':'راجع الدروس وحاول مجدداً';
  document.getElementById('scoreEmoji').textContent=emoji;
  document.getElementById('scoreVal').textContent=`${ok}/${tot}`;
  document.getElementById('scoreMsg').textContent=msg;
  document.getElementById('scoreBox').style.display='block';
  document.getElementById('scoreBox').scrollIntoView({behavior:'smooth'});
}
</script>
</body></html>
