<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="المساعد الذكي للرياضيات — مدعوم بـ Claude AI">
<title>المساعد الذكي — EDU MATH 🇹🇳</title>
<link rel="stylesheet" href="../shared.css">
<style>
/*
 * SECURITY NOTE:
 * All Anthropic API calls go through /api/chat (Vercel Edge Function)
 * The API key is NEVER in this file or any frontend JavaScript.
 * See /api/chat.js for the server-side implementation.
 */
.chat-layout { display:flex; gap:0; height:calc(100vh - 61px); overflow:hidden; }
.chat-sidebar { width:240px; border-left:1px solid var(--border); background:#fff; display:flex; flex-direction:column; overflow:hidden; }
.sidebar-header { padding:1rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.sidebar-header h3 { font-size:.95rem; }
.new-chat-btn { padding:.35rem .75rem; font-size:.82rem; background:var(--green-l); color:var(--green); border:none; border-radius:7px; cursor:pointer; font-family:inherit; font-weight:500; }
.new-chat-btn:hover { background:#c6e8d4; }
.history-list { flex:1; overflow-y:auto; padding:.5rem; }
.history-item { padding:.55rem .75rem; border-radius:8px; font-size:.85rem; color:var(--muted); cursor:pointer; margin-bottom:.2rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:background .15s; }
.history-item:hover { background:var(--surface); color:var(--ink); }
.history-item.active { background:var(--green-l); color:var(--green); }
.topic-chips { padding:.75rem; border-top:1px solid var(--border); }
.topic-chips h4 { font-size:.78rem; color:var(--muted); margin-bottom:.5rem; }
.chips { display:flex; flex-wrap:wrap; gap:.35rem; }
.chip { padding:.25rem .65rem; background:var(--surface); border:1px solid var(--border); border-radius:20px; font-size:.78rem; cursor:pointer; transition:all .15s; }
.chip:hover { background:var(--green-l); border-color:#a8d5bc; color:var(--green); }

.chat-main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.chat-header { padding:.85rem 1.25rem; border-bottom:1px solid var(--border); background:#fff; display:flex; align-items:center; justify-content:space-between; }
.chat-header h2 { font-size:1rem; }
.security-chip { background:var(--green-l); color:var(--green); font-size:.75rem; padding:.2rem .65rem; border-radius:20px; font-weight:500; }
.rate-counter { font-size:.8rem; color:var(--muted); }
.messages-wrap { flex:1; overflow-y:auto; padding:1.25rem; display:flex; flex-direction:column; gap:1rem; }
.msg { display:flex; gap:.75rem; max-width:85%; }
.msg.user { align-self:flex-end; flex-direction:row-reverse; }
.msg-bubble { padding:.75rem 1rem; border-radius:12px; font-size:.92rem; line-height:1.6; }
.msg.assistant .msg-bubble { background:#fff; border:1px solid var(--border); border-radius:12px 12px 4px 12px; }
.msg.user .msg-bubble { background:var(--green); color:#fff; border-radius:12px 12px 12px 4px; }
.msg-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.85rem; flex-shrink:0; }
.msg.assistant .msg-avatar { background:var(--green-l); }
.msg.user .msg-avatar { background:var(--green); color:#fff; font-size:.8rem; font-weight:700; }
.typing-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--muted); animation:bounce .8s infinite; margin:0 2px; }
.typing-dot:nth-child(2) { animation-delay:.15s; }
.typing-dot:nth-child(3) { animation-delay:.3s; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
.chat-input-area { padding:1rem 1.25rem; border-top:1px solid var(--border); background:#fff; }
.input-row { display:flex; gap:.65rem; align-items:flex-end; }
.msg-input { flex:1; padding:.65rem 1rem; border:1.5px solid var(--border); border-radius:10px; font-family:inherit; font-size:.92rem; resize:none; min-height:42px; max-height:140px; direction:rtl; transition:border-color .2s; }
.msg-input:focus { outline:none; border-color:var(--green); }
.send-btn { padding:.65rem 1.1rem; background:var(--green); color:#fff; border:none; border-radius:10px; cursor:pointer; font-size:1rem; transition:all .2s; flex-shrink:0; }
.send-btn:hover { background:#155d38; }
.send-btn:disabled { background:#ccc; cursor:not-allowed; }
.quick-btns { display:flex; gap:.5rem; margin-bottom:.65rem; flex-wrap:wrap; }
.quick-btn { padding:.3rem .75rem; background:var(--surface); border:1px solid var(--border); border-radius:20px; font-size:.8rem; cursor:pointer; font-family:inherit; transition:all .15s; }
.quick-btn:hover { background:var(--green-l); border-color:#a8d5bc; color:var(--green); }
.gate-overlay { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; padding:2rem; text-align:center; flex:1; }
.gate-overlay h3 { font-size:1.2rem; }
.gate-overlay p { color:var(--muted); max-width:360px; }
@media(max-width:768px){.chat-sidebar{display:none;}.chat-main{width:100%;}}
</style>
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="nav-brand"><span class="sigma">∑</span> EDU MATH</a>
  <ul class="nav-links">
    <li><a href="../index.html">الرئيسية</a></li>
    <li><a href="lessons.html">الدروس</a></li>
    <li><a href="exercises.html">التمارين</a></li>
    <li><a href="exams.html">الامتحانات</a></li>
    <li><a href="assistant.html" class="active">المساعد 🤖</a></li>
    <li><a href="payment.html">الاشتراك</a></li>
  </ul>
  <div class="nav-actions" id="navActions"></div>
</nav>

<div class="chat-layout">
  <!-- SIDEBAR -->
  <aside class="chat-sidebar">
    <div class="sidebar-header">
      <h3>المحادثات</h3>
      <button class="new-chat-btn" onclick="newChat()">+ جديد</button>
    </div>
    <div class="history-list" id="historyList"></div>
    <div class="topic-chips">
      <h4>موضوع سريع</h4>
      <div class="chips">
        <span class="chip" onclick="setTopic('الأعداد الصحيحة')">ℤ الأعداد</span>
        <span class="chip" onclick="setTopic('الكسور')">½ الكسور</span>
        <span class="chip" onclick="setTopic('الهندسة')">△ الهندسة</span>
        <span class="chip" onclick="setTopic('التناسبية')">% التناسب</span>
        <span class="chip" onclick="setTopic('المعادلات')">= المعادلات</span>
        <span class="chip" onclick="setTopic('فيثاغورس')">📐 فيثاغورس</span>
      </div>
    </div>
  </aside>

  <!-- MAIN CHAT -->
  <main class="chat-main" id="chatMain">
    <!-- content injected by JS depending on auth state -->
  </main>
</div>

<script src="../auth.js"></script>
<script>
const SYSTEM_PROMPT = `أنت "كلود الخبير" — مساعد رياضيات متخصص للمرحلة الإعدادية التونسية (السنوات 7، 8، 9 أساسي).

قواعدك:
- أجب دائماً بالعربية الفصحى البسيطة المفهومة للتلميذ التونسي
- اشرح خطوة بخطوة مع أمثلة واضحة
- استخدم الرموز الرياضية الصحيحة
- اربط دائماً بالمنهج التونسي الرسمي
- إذا كان السؤال خارج الرياضيات، أعِد التوجيه بلطف
- استخدم التشجيع والإيجابية مع الطالب`;

let messages = [];
let currentTopic = '';
let dailyUsed = 0;
const DAILY_LIMIT = 50;

function initChat() {
  const chatMain = document.getElementById('chatMain');
  const user = AuthManager.getUser();

  if (!AuthManager.canAccess('assistant')) {
    chatMain.innerHTML = `
      <div class="gate-overlay">
        <div style="font-size:3rem">🤖</div>
        <h3>المساعد الذكي — Claude AI</h3>
        <p>المساعد الذكي متاح للمشتركين والمستخدمين في فترة التجربة المجانية. سجّل حساباً جديداً مجاناً وابدأ التجربة 7 أيام!</p>
        <button class="btn-primary" onclick="AuthModal.open('register')" style="font-size:1rem;padding:.65rem 1.5rem">🎁 ابدأ مجاناً 7 أيام</button>
        <button class="btn-login" onclick="AuthModal.open('login')" style="margin-top:.5rem">لديّ حساب — دخول</button>
      </div>`;
    return;
  }

  // Count today's usage
  const key = `em_rate_${user.id}_${new Date().toDateString()}`;
  dailyUsed = parseInt(localStorage.getItem(key) || '0');

  chatMain.innerHTML = `
    <div class="chat-header">
      <div>
        <h2>🤖 كلود الخبير — EDU MATH</h2>
        <span class="rate-counter" id="rateCounter">${dailyUsed}/${DAILY_LIMIT} رسائل اليوم</span>
      </div>
      <span class="security-chip">🔒 اتصال آمن — API محمي</span>
    </div>
    <div class="messages-wrap" id="messagesWrap"></div>
    <div class="chat-input-area">
      <div class="quick-btns">
        <button class="quick-btn" onclick="quickAsk('اشرح لي مثال محلول خطوة بخطوة')">🎲 مثال محلول</button>
        <button class="quick-btn" onclick="quickAsk('ما نقاط ضعفي الأكثر شيوعاً في هذا الموضوع؟')">⚠️ نقاط الضعف</button>
        <button class="quick-btn" onclick="quickAsk('أعطني ملخصاً سريعاً للدرس')">📋 ملخص الدرس</button>
      </div>
      <div class="input-row">
        <textarea class="msg-input" id="msgInput" placeholder="اكتب سؤالك هنا... مثال: كيف أحل معادلة من الدرجة الأولى؟" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
      </div>
    </div>`;

  renderHistory();
  addWelcome();
}

function addWelcome() {
  const user = AuthManager.getUser();
  const name = user?.name?.split(' ')[0] || 'طالبي';
  addMessage('assistant', `مرحباً ${name}! 👋 أنا **كلود الخبير** — مساعدك في الرياضيات 🇹🇳\n\nاسألني عن أي درس أو مسألة في السنوات 7، 8، 9 أساسي وسأشرح لك خطوة بخطوة! 🎓\n\n**اختر موضوعاً** من القائمة الجانبية أو اكتب سؤالك مباشرة.`);
}

function addMessage(role, content) {
  messages.push({ role, content });
  renderMessages();
}

function renderMessages() {
  const wrap = document.getElementById('messagesWrap');
  if (!wrap) return;
  wrap.innerHTML = messages.map(m => {
    const user = AuthManager.getUser();
    const initials = user?.name?.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase() || 'أ';
    const isUser = m.role === 'user';
    const formatted = m.content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    return `<div class="msg ${m.role}">
      <div class="msg-avatar">${isUser ? initials : '🤖'}</div>
      <div class="msg-bubble">${formatted}</div>
    </div>`;
  }).join('');
  wrap.scrollTop = wrap.scrollHeight;
}

function showTyping() {
  const wrap = document.getElementById('messagesWrap');
  if (!wrap) return;
  const el = document.createElement('div');
  el.className = 'msg assistant'; el.id = 'typingEl';
  el.innerHTML = `<div class="msg-avatar">🤖</div><div class="msg-bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}

function removeTyping() {
  document.getElementById('typingEl')?.remove();
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;

  const user = AuthManager.getUser();
  const key  = `em_rate_${user.id}_${new Date().toDateString()}`;
  dailyUsed  = parseInt(localStorage.getItem(key) || '0');
  if (dailyUsed >= DAILY_LIMIT) {
    Toast.show('تجاوزت الحد اليومي للرسائل. جرّب غداً أو رقّ باشتراكك!', 'error'); return;
  }

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  showTyping();

  try {
    let systemPrompt = SYSTEM_PROMPT;
    if (currentTopic) systemPrompt += `\n\nموضوع الجلسة الحالية: ${currentTopic}`;

    // Call secure proxy — API key is on the server, never here
    const reply = await SecureAPI.chat(
      messages.filter(m => m.role !== 'system'),
      systemPrompt
    );
    removeTyping();
    addMessage('assistant', reply);

    // Update rate counter
    const newCount = parseInt(localStorage.getItem(key) || '0');
    document.getElementById('rateCounter').textContent = `${newCount}/${DAILY_LIMIT} رسائل اليوم`;

    // Save to history
    saveHistory();
  } catch (e) {
    removeTyping();
    addMessage('assistant', `⚠️ حدث خطأ: ${e.message}`);
  } finally {
    document.getElementById('sendBtn').disabled = false;
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 140) + 'px'; }
function quickAsk(q) { document.getElementById('msgInput').value = q; sendMessage(); }
function setTopic(t) { currentTopic = t; Toast.show(`الموضوع: ${t}`, 'info', 2000); document.querySelector('#msgInput')?.focus(); }

function saveHistory() {
  const key = 'em_chat_history';
  const hist = JSON.parse(localStorage.getItem(key) || '[]');
  const title = messages.find(m => m.role === 'user')?.content?.slice(0, 40) || 'محادثة جديدة';
  hist.unshift({ id: Date.now(), title, messages: [...messages] });
  localStorage.setItem(key, JSON.stringify(hist.slice(0, 20)));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (!list) return;
  const hist = JSON.parse(localStorage.getItem('em_chat_history') || '[]');
  list.innerHTML = hist.map(h => `<div class="history-item" onclick="loadHistory(${h.id})">${h.title}</div>`).join('') || '<div style="font-size:.8rem;color:var(--muted);padding:.5rem">لا توجد محادثات سابقة</div>';
}

function loadHistory(id) {
  const hist = JSON.parse(localStorage.getItem('em_chat_history') || '[]');
  const h = hist.find(x => x.id === id);
  if (!h) return;
  messages = h.messages;
  renderMessages();
}

function newChat() { messages = []; addWelcome(); }

document.addEventListener('authReady', initChat);
</script>
</body>
</html>
